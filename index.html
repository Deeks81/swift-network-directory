<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SWIFT/BIC Bank Directory</title>
<style>
  :root {
    --bg: #0b0f19;
    --card: #111827;
    --card-hover: #1f2937;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.3);
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --border: #1e293b;
    --success: #22c55e;
    --error-bg: #1e1b4b;
    --error-text: #a5b4fc;
    --ad-bg: #0f172a;
    --ad-border: #334155;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { font-size:16px; }
  body {
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:1200px; margin:0 auto; padding:0 12px; }
  
  /* --- TOP AD LEADERBOARD STRIP --- */
  .ad-top {
    width:100%;
    min-height:90px;
    background:var(--ad-bg);
    border:1px dashed var(--ad-border);
    border-radius:8px;
    margin:12px 0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-dim);
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
  }
  
  /* --- HEADER --- */
  header {
    padding:20px 0 12px;
    text-align:center;
  }
  header h1 {
    font-size:1.4rem;
    font-weight:700;
    letter-spacing:-0.5px;
    background:linear-gradient(135deg,#60a5fa,#a78bfa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  header p {
    color:var(--text-dim);
    font-size:0.8rem;
    margin-top:4px;
  }
  
  /* --- SEARCH --- */
  .search-box {
    position:relative;
    margin:16px 0;
  }
  .search-box input {
    width:100%;
    padding:14px 48px 14px 16px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    color:var(--text);
    font-size:1rem;
    outline:none;
    transition:border-color 0.2s,box-shadow 0.2s;
  }
  .search-box input:focus {
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-glow);
  }
  .search-box input::placeholder { color:#475569; }
  .search-box button {
    position:absolute;
    right:6px;
    top:50%;
    transform:translateY(-50%);
    background:var(--accent);
    border:none;
    border-radius:8px;
    color:#fff;
    padding:8px 16px;
    font-size:0.85rem;
    font-weight:600;
    cursor:pointer;
    transition:opacity 0.2s;
  }
  .search-box button:active { opacity:0.7; }
  
  /* --- FUNNEL JOURNEY CARDS --- */
  .funnel-wrap {
    margin:16px 0;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .funnel-wrap::-webkit-scrollbar { display:none; }
  .funnel {
    display:flex;
    gap:10px;
    padding:4px 2px;
    min-width:max-content;
  }
  .funnel-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 16px;
    min-width:140px;
    text-align:center;
    transition:transform 0.15s,background 0.15s;
    flex-shrink:0;
  }
  .funnel-card.active {
    background:var(--card-hover);
    border-color:var(--accent);
    box-shadow:0 0 12px var(--accent-glow);
  }
  .funnel-card .label {
    font-size:0.65rem;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--text-dim);
    margin-bottom:4px;
    white-space:nowrap;
  }
  .funnel-card .value {
    font-size:0.95rem;
    font-weight:600;
    color:var(--text);
    white-space:nowrap;
  }
  .arrow {
    display:flex;
    align-items:center;
    color:var(--text-dim);
    font-size:1rem;
    flex-shrink:0;
    padding:0 2px;
  }
  
  /* --- SIDEBAR AD BANNER --- */
  .ad-sidebar {
    width:100%;
    min-height:250px;
    background:var(--ad-bg);
    border:1px dashed var(--ad-border);
    border-radius:8px;
    margin:16px 0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-dim);
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
  }
  
  /* --- RESULTS AREA --- */
  .results-area { margin:16px 0; }
  .section-title {
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--text-dim);
    margin-bottom:10px;
    padding-left:4px;
  }
  
  /* --- BANK CARD --- */
  .bank-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    margin-bottom:12px;
    transition:transform 0.15s;
  }
  .bank-card:active { transform:scale(0.99); }
  .bank-card .bank-name {
    font-size:1.05rem;
    font-weight:700;
    color:var(--text);
    margin-bottom:6px;
  }
  .bank-card .bank-meta {
    font-size:0.8rem;
    color:var(--text-dim);
    line-height:1.5;
  }
  .bank-card .swift-row {
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid var(--border);
  }
  .bank-card .swift-code {
    font-family:'SF Mono',Monaco,monospace;
    font-size:1.1rem;
    font-weight:700;
    color:var(--success);
    letter-spacing:1px;
  }
  .bank-card .copy-btn {
    background:rgba(34,197,94,0.1);
    border:1px solid rgba(34,197,94,0.3);
    color:var(--success);
    padding:6px 14px;
    border-radius:6px;
    font-size:0.75rem;
    font-weight:600;
    cursor:pointer;
    transition:all 0.2s;
  }
  .bank-card .copy-btn:active { background:rgba(34,197,94,0.2); }
  
  /* --- ERROR CARD --- */
  .info-card {
    background:var(--error-bg);
    border:1px solid #312e81;
    border-radius:12px;
    padding:20px;
    text-align:center;
    margin:16px 0;
  }
  .info-card p {
    color:var(--error-text);
    font-size:0.9rem;
    line-height:1.5;
  }
  
  /* --- STICKY ANCHOR AD STRIP --- */
  .ad-sticky {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:60px;
    background:var(--ad-bg);
    border-top:1px dashed var(--ad-border);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-dim);
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    z-index:100;
  }
  .sticky-spacer { height:72px; }
  
  /* --- RESPONSIVE --- */
  @media(min-width:768px){
    .main-layout {
      display:grid;
      grid-template-columns:1fr 300px;
      gap:20px;
      align-items:start;
    }
    .ad-sidebar { position:sticky; top:16px; margin:0; }
  }
</style>
</head>

      <div class="arrow">›</div>

      <div class="arrow">›</div>
      <div class="funnel-card" id="f-city">
        <div class="label">City</div>
        <div class="value" id="v-city">—</div>
      </div>
    </div>
  </div>
</div>

<div class="wrap main-layout">
  <div class="results-area" id="resultsArea">
    <div class="section-title" id="resultsTitle" style="display:none;">Matching Banks</div>
    <div id="bankList"></div>
  </div>
  
  <!-- SIDEBAR AD BANNER -->
  <div class="ad-sidebar" id="ad-sidebar">
    [SIDEBAR AD BANNER]
    <!-- Paste PropellerAds sidebar script here -->
  </div>
</div>

<div class="ad-sticky" id="ad-sticky">

</div>

function norm(s){return(s||'').toLowerCase().trim();}

function findShard(q){
  const t=norm(q);
  for(const [k,v] of Object.entries(SHARD_MAP)){
    if(t.includes(k)) return v;
  }
  return null;
}

function getContinent(s){return CONTINENT_MAP[s]||'—';}

function fmtCountry(s){
  return s.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
}

async function loadShard(n){
  const r=await fetch('./countries/'+n+'.json');
  if(!r.ok) throw new Error('fail');
  return r.json();
}

function looseMatch(b,terms){
  const hay=norm([b.name,b.city,b.state,b.branch,b.address].filter(Boolean).join(' '));
  return terms.every(t=>hay.includes(t));
}

function tokenize(q){
  return norm(q).split(/\s+/).filter(t=>t.length>0);
}

function updateFunnel(c,co,s,ci){
  document.getElementById('v-continent').textContent=c||'—';
  document.getElementById('v-country').textContent=co||'—';
  document.getElementById('v-state').textContent=s||'—';
  document.getElementById('v-city').textContent=ci||'—';
  ['continent','country','state','city'].forEach(k=>{
    document.getElementById('f-'+k).classList.toggle(
      'active',document.getElementById('v-'+k).textContent!=='—'
    );
  });
}

function esc(t){
  const d=document.createElement('div');
  d.textContent=t;
  return d.innerHTML;
}

function renderBanks(list,shard){
  const box=document.getElementById('bankList');
  const ttl=document.getElementById('resultsTitle');
  box.innerHTML='';
  if(!list||!list.length){
    ttl.style.display='none';
    box.innerHTML='<div class="info-card"><p>Bank or location not found. Please check your spelling.</p></div>';
    updateFunnel('—','—','—','—');
    return;
  }
  ttl.style.display='block';
  ttl.textContent=list.length+' Matching Bank'+(list.length>1?'s':'');
  list.forEach(b=>{
    const d=document.createElement('div');
    d.className='bank-card';
    d.style.cursor='pointer';
    d.innerHTML=
      '<div class="bank-name">'+esc(b.name)+'</div>'+
      '<div class="bank-meta">'+
        (b.branch?esc(b.branch)+'<br>':'')+
        esc(b.address||'')+'<br>'+
        esc(b.city||'')+(b.state?', '+esc(b.state):'')+
        (b.zip?' '+esc(b.zip):'')+
      '</div>'+
      '<div class="swift-row">'+
        '<div class="swift-code">'+esc(b.swift||'N/A')+'</div>'+
        '<button class="copy-btn" onclick="event.stopPropagation();copySwift(this,\''+esc(b.swift||'')+'\')">Copy</button>'+
      '</div>';
    d.addEventListener('click',()=>{
      updateFunnel(getContinent(shard),fmtCountry(shard),b.state||'—',b.city||'—');
      document.querySelectorAll('.bank-card').forEach(c=>c.style.borderColor='');
      d.style.borderColor='var(--accent)';
    });
    box.appendChild(d);
  });
  updateFunnel(getContinent(shard),fmtCountry(shard),list[0].state||'—',list[0].city||'—');
}

function copySwift(btn,code){
  navigator.clipboard.writeText(code).then(()=>{
    const o=btn.textContent;
    btn.textContent='Copied';
    btn.style.background='rgba(34,197,94,0.25)';
    setTimeout(()=>{btn.textContent=o;btn.style.background='';},1200);
  });
}

async function runSearch(){
  const raw=document.getElementById('searchInput').value.trim();
  if(!raw) return;
  const shard=findShard(raw);
  const box=document.getElementById('bankList');
  box.innerHTML='<div class="info-card"><p>Searching...</p></div>';
  if(!shard){
    renderBanks([]);
    return;
  }
  try{
    const data=await loadShard(shard);
    const terms=tokenize(raw);
    const hits=data.banks.filter(b=>looseMatch(b,terms));
    renderBanks(hits,shard);
  }catch(e){
    renderBanks([]);
  }
}

document.getElementById('searchInput').addEventListener('keypress',e=>{
  if(e.key==='Enter') runSearch();
});
</script>
</body>
</html>
