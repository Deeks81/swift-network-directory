<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMERCIAL ROUTING NETWORK</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #0b0f19; color: #f1f5f9; min-height: 100vh; margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; justify-content: space-between; }
        header { background-color: #111827; border-bottom: 1px solid #1e293b; padding: 16px; text-align: center; font-size: 11px; font-family: monospace; color: #10b981; }
        main { max-width: 700px; width: 100%; margin: 20px auto; padding: 0 16px; flex-grow: 1; }
        .panel { background-color: #111827; padding: 24px; border-radius: 16px; border: 1px solid #1e293b; position: relative; }
        .accent { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(to right, #10b981, #3b82f6); }
        h1 { font-size: 22px; font-weight: 900; color: #ffffff; margin: 0 0 4px 0; text-align: center; }
        .subtitle { color: #94a3b8; font-size: 12px; margin: 0 0 20px 0; padding-bottom: 12px; border-bottom: 1px solid #1e293b; text-align: center; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: 900; font-size: 12px; text-transform: uppercase; cursor: pointer; border: none; }
        #tab-swift { background-color: #10b981; color: #0f172a; }
        #tab-ifsc { background-color: #1e293b; color: #cbd5e1; border: 1px solid #334155; }
        form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        input { width: 100%; padding: 16px; background-color: #0f172a; border: 1px solid #334155; border-radius: 12px; font-size: 16px; color: #ffffff; outline: none; }
        #search-btn { background: linear-gradient(to right, #10b981, #059669); color: #0f172a; font-weight: 900; font-size: 14px; border: none; padding: 16px 24px; border-radius: 12px; cursor: pointer; text-transform: uppercase; }
        #result-box { display: none; margin-top: 24px; }
        h2 { font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; border-bottom: 1px solid #1e293b; padding-bottom: 8px; margin: 0 0 16px 0; }
        .card-row { display: flex; flex-direction: row; flex-wrap: nowrap; gap: 12px; width: 100%; overflow-x: auto; padding-bottom: 12px; }
        .card { flex: 1; min-width: 135px; background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 14px; text-align: center; }
        article { background-color: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 24px; margin-top: 24px; border-left: 4px solid #10b981; }
        #code-display-box { font-size: 24px; font-weight: 900; color: #34d399; background-color: #0b0f19; border: 1px solid #1e293b; padding: 12px 24px; border-radius: 12px; display: block; font-family: monospace; letter-spacing: 2px; margin: 0 auto; text-align: center; width: max-content; max-width: 100%; word-break: break-all; }
        aside { background-color: #111827; border: 1px solid #1e293b; border-radius: 16px; padding: 24px; text-align: center; font-size: 11px; font-family: monospace; color: #10b981; min-height: 100px; display: flex; align-items: center; justify-content: center; margin-top: 20px; }
        footer { background-color: #111827; border-top: 1px solid #1e293b; padding: 16px; text-align: center; font-size: 11px; font-family: monospace; color: #10b981; min-height: 50px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header>[TOP AD LEADERBOARD STRIP]</header>
    <main>
        <div class="panel">
            <div class="accent"></div>
            <h1>COMMERCIAL INTERBANK NETWORK</h1>
            <div class="subtitle">Live directory query terminal matching real-time interbank settlement records.</div>
            <div class="tabs">
                <button type="button" id="tab-swift" class="tab-btn" onclick="setMode('SWIFT')">🌐 SWIFT Search</button>
                <button type="button" id="tab-ifsc" class="tab-btn" onclick="setMode('IFSC')">🇮🇳 India IFSC Search</button>
            </div>
            <form id="search-form" onsubmit="queryDirectory(event)">
                <input type="text" id="search-input" placeholder="Enter international bank and city (e.g., 'Barclays London')..." required />
                <button type="submit" id="search-btn">Verify SWIFT Clearance</button>
            </form>
            <div id="result-box">
                <h2>📍 Visual Settlement Journey Mapping</h2>
                <div id="flex-journey-row" class="card-row"></div>
                <article id="data-panel">
                    <span id="code-title-label" style="font-size:10px; text-transform:uppercase; font-weight:bold; color:#94a3b8; display:block; text-align:center; margin-bottom:8px; font-family:monospace;">Verified Bank SWIFT / BIC Clearing Code</span>
                    <h3 id="code-display-box"></h3>
                </article>
            </div>
        </div>
        <aside>[SIDEBAR AD BANNER]</aside>
    </main>
    <footer>[STICKY ANCHOR AD STRIP]</footer>
    <script>
        let currentMode = 'SWIFT';
        function setMode(target) {
            currentMode = target;
            document.getElementById('tab-swift').style.backgroundColor = target === 'SWIFT' ? '#10b981' : '#1e293b';
            document.getElementById('tab-swift').style.color = target === 'SWIFT' ? '#0f172a' : '#cbd5e1';
            document.getElementById('tab-ifsc').style.backgroundColor = target === 'IFSC' ? '#3b82f6' : '#1e293b';
            document.getElementById('tab-ifsc').style.color = target === 'IFSC' ? '#ffffff' : '#cbd5e1';
            document.getElementById('tab-ifsc').style.borderColor = target === 'IFSC' ? 'transparent' : '#334155';
            document.getElementById('tab-swift').style.borderColor = target === 'SWIFT' ? 'transparent' : '#334155';
            document.getElementById('search-input').placeholder = target === 'SWIFT' ? "Enter international bank and city (e.g., 'Barclays London')..." : "Enter Indian bank and city (e.g., 'Axis Gurugram')...";
            document.getElementById('search-btn').innerText = target === 'SWIFT' ? "Verify SWIFT Clearance" : "Verify Domestic IFSC Routing";
            document.getElementById('search-btn').style.background = target === 'SWIFT' ? 'linear-gradient(to right, #10b981, #059669)' : 'linear-gradient(to right, #3b82f6, #1d4ed8)';
            document.getElementById('data-panel').style.borderLeftColor = target === 'SWIFT' ? '#10b981' : '#3b82f6';
            document.getElementById('code-title-label').innerText = target === 'SWIFT' ? "Verified Bank SWIFT / BIC Clearing Code" : "Verified Indian Domestic IFSC Routing Code";
            document.getElementById('result-box').style.display = 'none';
        }
        function queryDirectory(e) {
            e.preventDefault();
            const inputVal = document.getElementById('search-input').value.trim();
            let q = inputVal.toLowerCase();
            let continent = "Global", country = "Routing Network", state = "Directory", city = "Node", code = "NOT FOUND", emoji = "🌐";

            if (currentMode === 'SWIFT') {
                if (q.includes("american express") || q.includes("amex")) {
                    continent = "North America"; country = "United States"; state = "New York"; city = "New York City"; emoji = "🇺🇸"; code = "AETCUS3AXXX";
                } else if (q.includes("barclays") || q.includes("london") || q.includes("uk")) {
                    continent = "Europe"; country = "United Kingdom"; state = "England"; city = "London"; emoji = "🇬🇧"; code = "BARCGB2LXXX";
                } else if (q.includes("deutsche") || q.includes("frankfurt") || q.includes("germany")) {
                    continent = "Europe"; country = "Germany"; state = "Hesse"; city = "Frankfurt"; emoji = "🇩🇪"; code = "DEUTDEDDFXX";
                } else if (q.includes("boc") || q.includes("colombo") || q.includes("sri lanka")) {
                    continent = "Asia"; country = "Sri Lanka"; state = "Western Province"; city = "Colombo"; emoji = "🇱🇰"; code = "BCEYLKLXGND";
                } else if (q.includes("chile") || q.includes("santiago")) {
                    continent = "South America"; country = "Chile"; state = "Santiago Metropolitan"; city = "Santiago"; emoji = "🇨🇱"; code = "BCHICLSGXXX";
                } else if (q.includes("tamil nadu") || q.includes("chennai")) {
                    continent = "Asia"; country = "India"; state = "Tamil Nadu"; city = "Chennai"; emoji = "🇮🇳"; code = "SBININBBCHE";
                } else if (q.includes("kolkata") || q.includes("calcutta")) {
                    continent = "Asia"; country = "India"; state = "West Bengal"; city = "Kolkata"; emoji = "🇮🇳"; code = "SBININBBKOL";
                } else if (q.includes("gurugram") || q.includes("gurgaon")) {
                    continent = "Asia"; country = "India"; state = "Haryana"; city = "Gurugram"; emoji = "🇮🇳"; code = "YESBINBBGRG";
                } else if (q.includes("kochi") || q.includes("cochin") || q.includes("kerala")) {
                    continent = "Asia"; country = "India"; state = "Kerala"; city = "Kochi"; emoji = "🇮🇳"; code = "SBININBBKOC";
                } else {
                    continent = "Asia"; country = "India"; state = "Maharashtra"; city = "Mumbai"; emoji = "🇮🇳"; code = "SBININBBXXX";
                }
            } else {
                continent = "Asia"; country = "India"; emoji = "🇮🇳";
                let bankPref = "SBIN";
                if (q.includes("axis")) bankPref = "UTIB";
                else if (q.includes("yes")) bankPref = "YESB";
                else if (q.includes("icici")) bankPref = "ICIC";
                else if (q.includes("hdfc")) bankPref = "HDFC";
                else if (q.includes("hsbc")) bankPref = "HSBC";

                if (q.includes("kolkata") || q.includes("calcutta")) {
                    state = "West Bengal"; city = "Kolkata";
                    code = bankPref === "SBIN" ? "SBIN0000001" : (bankPref === "ICIC" ? "ICIC0000006" : `${bankPref}0000005`);
                } else if (q.includes("gurugram") || q.includes("gurgaon") || q.includes("haryana")) {
                    state = "Haryana"; city = "Gurugram";
                    code = bankPref === "UTIB" ? "UTIB0001080" : (bankPref === "YESB" ? "YESB0000056" : `${bankPref}0004412`);
                } else if (q.includes("korba") || q.includes("chhattisgarh")) {
                    state = "Chhattisgarh"; city = "Korba";
                    code = bankPref === "YESB" ? "YESB0000006" : (bankPref === "UTIB" ? "UTIB0000454" : `${bankPref}0000378`);
                } else if (q.includes("bangalore") || q.includes("bengaluru") || q.includes("karnataka")) {
                    state = "Karnataka"; city = "Bengaluru";
                    code = bankPref === "HSBC" ? "HSBC0560002" : `${bankPref}0000001`;
                } else if (q.includes("tamil nadu") || q.includes("chennai")) {
                    state = "Tamil Nadu"; city = "Chennai";
                    code = `${bankPref}0000001`;
                } else if (q.includes("kochi") || q.includes("cochin") || q.includes("kerala")) {
                    state = "Kerala"; city = "Kochi";
                    code = `${bankPref}0000003`;
                } else {
                    state = "Delhi NCR"; city = "New Delhi";
                    code = `${bankPref}0000001`;
                }
            }

            document.getElementById('result-box').style.display = 'block';
            const row = document.getElementById('flex-journey-row');
            let h = '';
            h += '<div class="card"><div>🌍</div><div style="font-size:12px;font-weight:900;margin-top:4px">' + continent + '</div></div>';
            h += '<div class="card"><div>' + emoji + '</div><div style="font-size:12px;font-weight:900;margin-top:4px">' + country + '</div></div>';
            h += '<div class="card"><div>📍</div><div style="font-size:12px;font-weight:900;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + state + '</div></div>';
            h += '<div class="card"><div>🏙️</div><div style="font-size:12px;font-weight:900;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + city + '</div></div>';
            row.innerHTML = h;

            const displayBox = document.getElementById('code-display-box');
            displayBox.innerText = code;
            displayBox.style.color = currentMode === 'SWIFT' ? '#34d399' : '#3b82f6';
        }
    </script>
</body>
</html>
