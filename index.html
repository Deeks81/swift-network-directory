<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SWIFT / BIC Bank Directory</title>
<style>
  :root {
    --bg: #0b0f19;
    --card: #111827;
    --card-hover: #1f2937;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.15);
    --border: #1f2937;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; min-height:100vh; overflow-x:hidden; }
  body { padding-bottom:80px; }

  /* TOP AD LEADERBOARD STRIP */
  .ad-top {
    width:100%; min-height:90px; background:var(--card); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:11px; letter-spacing:1px; text-transform:uppercase;
  }

  /* HEADER */
  header { padding:20px 16px 12px; text-align:center; }
  header h1 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  header p { font-size:13px; color:var(--muted); margin-top:4px; }

  /* SEARCH */
  .search-wrap { padding:0 16px 16px; }
  .search-box { display:flex; gap:8px; }
  .search-box input {
    flex:1; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px;
    color:var(--text); font-size:15px; outline:none; transition:border .2s;
  }
  .search-box input:focus { border-color:var(--accent); }
  .search-box button {
    background:var(--accent); color:#fff; border:none; border-radius:var(--radius); padding:12px 18px;
    font-size:14px; font-weight:600; cursor:pointer; transition:opacity .2s; white-space:nowrap;
  }
  .search-box button:active { opacity:.8; }

  /* FUNNEL CARDS */
  .funnel-wrap { padding:0 16px 20px; }
  .funnel-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .funnel-track {
    display:flex; gap:10px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none; padding-bottom:4px;
  }
  .funnel-track::-webkit-scrollbar { display:none; }
  .funnel-card {
    flex:0 0 auto; min-width:140px; background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:14px 16px; text-align:center; transition:background .2s; position:relative;
  }
  .funnel-card.active { background:var(--accent-glow); border-color:var(--accent); }
  .funnel-card .step { font-size:10px; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .funnel-card .value { font-size:15px; font-weight:600; white-space:nowrap; }
  .funnel-arrow { flex:0 0 auto; display:flex; align-items:center; color:var(--muted); font-size:18px; padding:0 2px; }

  /* SIDEBAR AD BANNER */
  .ad-sidebar {
    margin:0 16px 16px; min-height:250px; background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:11px; letter-spacing:1px; text-transform:uppercase;
  }

  /* RESULTS */
  .results-wrap { padding:0 16px; }
  .section-title { font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .bank-card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; margin-bottom:12px; transition:background .2s;
  }
  .bank-card:active { background:var(--card-hover); }
  .bank-name { font-size:16px; font-weight:700; margin-bottom:6px; }
  .bank-meta { font-size:13px; color:var(--muted); line-height:1.5; }
  .swift-code {
    display:inline-block; margin-top:10px; background:var(--accent-glow); border:1px solid var(--accent);
    border-radius:var(--radius-sm); padding:6px 12px; font-family:'SF Mono',monospace;
    font-size:14px; font-weight:600; color:var(--accent); letter-spacing:1px;
  }

  /* ERROR CARD */
  .info-card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 16px; text-align:center; color:var(--muted); font-size:14px; line-height:1.6;
    margin:0 16px 16px;
  }

  /* STICKY ANCHOR AD STRIP */
  .ad-anchor {
    position:fixed; bottom:0; left:0; right:0; min-height:60px; background:var(--card);
    border-top:1px solid var(--border); display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:11px; letter-spacing:1px; text-transform:uppercase; z-index:100;
  }
  .ad-anchor-spacer { height:60px; }
</style>
</head>
<body>

<!-- TOP AD LEADERBOARD STRIP -->
<div class="ad-top">[TOP AD LEADERBOARD STRIP]</div>

<header>
  <h1>SWIFT / BIC Directory</h1>
  <p>Find bank codes worldwide</p>
</header>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="e.g. London, Santander Chile, Banco Itaú..." autocomplete="off">
    <button onclick="runSearch()">Search</button>
  </div>
</div>

<!-- MULTI-STEP FUNNEL -->
<div class="funnel-wrap">
  <div class="funnel-label">Settlement path</div>
  <div class="funnel-track" id="funnelTrack"></div>
</div>

<!-- SIDEBAR AD BANNER -->
<div class="ad-sidebar">[SIDEBAR AD BANNER]</div>

<!-- RESULTS -->
<div class="results-wrap" id="resultsArea"></div>

<!-- ERROR / INFO CARD (hidden by default) -->
<div class="info-card" id="infoCard" style="display:none;">
  Bank or location not found. Please check your spelling.
</div>

<!-- STICKY ANCHOR AD STRIP -->
<div class="ad-anchor">[STICKY ANCHOR AD STRIP]</div>
<div class="ad-anchor-spacer"></div>
